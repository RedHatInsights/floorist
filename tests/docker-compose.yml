services:
  db:
    image: quay.io/sclorg/postgresql-16-c9s:c9s
    restart: always
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRESQL_ADMIN_PASSWORD=flooristadmin
      - POSTGRESQL_PASSWORD=floorist
      - POSTGRESQL_USER=floorist
      - POSTGRESQL_DATABASE=floorist
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "--username=postgres", "--host=127.0.0.1", "--port=5432"]
      interval: 2s
      timeout: 1m
      retries: 5
      start_period: 10s
    volumes:
        - "${PWD}/tests/postgresql.conf:/opt/app-root/src/postgresql-cfg/postgresql.conf:z"
        - "${PWD}/tests/pg_hba.conf:/pg_hba.conf:z"
        - "${PWD}/tests/enable-extensions.sh:/opt/app-root/src/postgresql-start/enable-extensions.sh:z"

  minio:
    image: quay.io/minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: server /data
    ports:
      - 9000:9000
    environment:
      - MINIO_ACCESS_KEY=floorist
      - MINIO_SECRET_KEY=floorist

  createbucket:
    image: quay.io/minio/mc:RELEASE.2025-05-21T01-59-54Z
    depends_on:
      - minio
    entrypoint: /bin/sh
    command: -c '
      until /usr/bin/mc alias set myminio http://minio:9000 floorist floorist >/dev/null; do sleep 1; done ;
      /usr/bin/mc mb myminio/floorist;
      /usr/bin/mc anonymous set download myminio/floorist;
      exit 0;'
