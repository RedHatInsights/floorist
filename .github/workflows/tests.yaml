name: Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Run tests
        run: >
          QUAY_USER=${QUAY_CLOUDSERVICES_USER}
          QUAY_TOKEN=${QUAY_CLOUDSERVICES_TOKEN}
          LOCAL_BUILD=true
          ./pr_check.sh
